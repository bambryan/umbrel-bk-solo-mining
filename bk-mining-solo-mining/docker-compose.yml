version: "3.7"

# Umbrel injects:
#   networks.default → external umbrel_main_network (via common.yml fragment)
#   services.app_proxy → image, ports, volumes (via app_proxy.yml fragment)
# So we don't define `default` ourselves, and we declare app_proxy with only
# the overrides Umbrel allows (env, container_name).

services:
  app_proxy:
    environment:
      APP_HOST: bk-mining-solo-mining-dashboard
      APP_PORT: 3000
      JWT_SECRET: ${JWT_SECRET}
    container_name: bk-mining-solo-mining_app_proxy_1

  # One-shot service that renders the config templates into the real config
  # files on first boot. Idempotent: only writes if the destination is missing.
  init:
    image: alpine:3.22.1
    user: "0:0"
    environment:
      APPS_SUBNET: ${NETWORK_IP}/16
      APP_PASSWORD: ${APP_PASSWORD}
      APP_BCH_P2P_PORT: "28333"
      APP_BCH_RPC_PORT: "28332"
      APP_BCH_ZMQ_HASHBLOCK_PORT: "28334"
    volumes:
      - ${APP_DATA_DIR}/data:/data
    command:
      - /bin/sh
      - -ec
      - |
        apk add --no-cache envsubst >/dev/null
        mkdir -p \
          /data/bchn /data/ckpool/config /data/ckpool/www/pool /data/ckpool/www/users \
          /data/btc/bitcoind /data/btc/ckpool/config /data/btc/ckpool/www/pool /data/btc/ckpool/www/users \
          /data/templates /data/snapshots

        # BCH templates → live config (idempotent)
        if [ ! -f /data/bchn/bitcoin.conf ]; then
          envsubst < /data/templates/bitcoin.conf.template > /data/bchn/bitcoin.conf
        fi
        if [ ! -f /data/ckpool/config/ckpool.conf ]; then
          envsubst < /data/templates/ckpool.conf.template > /data/ckpool/config/ckpool.conf
        fi

        # BTC templates → live config (idempotent). For a fresh install these
        # produce a CHANGE_ME btcaddress; for the AxeBTC migration the files
        # are pre-populated so the templates are skipped.
        if [ ! -f /data/btc/bitcoind/bitcoin.conf ]; then
          envsubst < /data/templates/btc-bitcoin.conf.template > /data/btc/bitcoind/bitcoin.conf
        fi
        if [ ! -f /data/btc/ckpool/config/ckpool.conf ]; then
          envsubst < /data/templates/btc-ckpool.conf.template > /data/btc/ckpool/config/ckpool.conf
        fi

        # Node-process dirs owned by 1000:1000 (bchn + bitcoind containers run
        # as that uid). Ckpool stats dirs likewise — ckpool writes there.
        chown -R 1000:1000 /data/bchn /data/ckpool/www /data/btc/bitcoind /data/btc/ckpool/www
        # Dashboard (nextjs uid 1001) writes ckpool.conf + sentinel files in
        # /data/{,btc/}ckpool/config and the snapshots dir. ckpool runs as
        # 1000 but only READS the config, so 1001-owned + mode 644 works.
        chown -R 1001:1001 /data/ckpool/config /data/btc/ckpool/config /data/snapshots
        echo "[init] ready"

  bchn:
    image: ghcr.io/willitmod/bitcoin-cash-node:v29.0.0-wm3
    container_name: bk-mining-solo-mining_bchn_1
    user: "1000:1000"
    restart: unless-stopped
    stop_grace_period: 15m30s
    depends_on:
      init:
        condition: service_completed_successfully
    ports:
      - "28333:28333/tcp"
    volumes:
      - ${APP_DATA_DIR}/data/bchn:/data
      - ${APP_DATA_DIR}/data/templates/bchn-entrypoint.sh:/bchn-entrypoint.sh:ro
    entrypoint:
      - /bin/sh
      - /bchn-entrypoint.sh
    healthcheck:
      test: ["CMD-SHELL", "bitcoin-cli -datadir=/data getblockchaininfo >/dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 2m

  ckpool:
    image: ghcr.io/willitmod/wim-solo-ckpool:0.8.3-rc1-590fb2a
    container_name: bk-mining-solo-mining_ckpool_1
    user: "1000:1000"
    restart: on-failure
    stop_grace_period: 30s
    depends_on:
      bchn:
        condition: service_healthy
    ports:
      - "4567:3333/tcp"
    volumes:
      # Note: ckpool needs to read /config and may need to read sentinel files
      # the dashboard writes there. Mounted RW (dashboard chmod 644).
      - ${APP_DATA_DIR}/data/ckpool/config:/config
      - ${APP_DATA_DIR}/data/ckpool/www:/www
      - ${APP_DATA_DIR}/data/templates/ckpool-entrypoint.sh:/ckpool-entrypoint.sh:ro
    entrypoint:
      - /bin/sh
      - /ckpool-entrypoint.sh

  btc-bitcoind:
    # WillItMod's multi-impl image: switches between Bitcoin Core and Bitcoin
    # Knots based on the `btc_core_choice` sentinel file in /data. Reusing
    # their image so the existing chain data (migrated from AxeBTC) is
    # binary-compatible without resync.
    image: ghcr.io/willitmod/axebtc-bitcoind-switch:0.7.44
    container_name: bk-mining-solo-mining_btc_bitcoind_1
    user: "1000:1000"
    restart: unless-stopped
    stop_grace_period: 15m30s
    depends_on:
      init:
        condition: service_completed_successfully
    ports:
      - "8333:8333/tcp"
    volumes:
      - ${APP_DATA_DIR}/data/btc/bitcoind:/data
    healthcheck:
      test: ["CMD-SHELL", "bitcoin-cli -datadir=/data getblockchaininfo >/dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 2m

  btc-ckpool:
    image: ghcr.io/willitmod/wim-solo-ckpool:0.8.3-rc1-590fb2a
    container_name: bk-mining-solo-mining_btc_ckpool_1
    user: "1000:1000"
    restart: on-failure
    stop_grace_period: 30s
    depends_on:
      btc-bitcoind:
        condition: service_healthy
    ports:
      - "7890:3333/tcp"
    volumes:
      - ${APP_DATA_DIR}/data/btc/ckpool/config:/config
      - ${APP_DATA_DIR}/data/btc/ckpool/www:/www
      - ${APP_DATA_DIR}/data/templates/ckpool-entrypoint.sh:/ckpool-entrypoint.sh:ro
    entrypoint:
      - /bin/sh
      - /ckpool-entrypoint.sh

  dashboard:
    image: bk-mining-solo-mining-dashboard:0.1.0
    pull_policy: never
    container_name: bk-mining-solo-mining-dashboard
    restart: unless-stopped
    # The dashboard runs as uid 1001 (nextjs user from its Dockerfile). To
    # call the Docker API via /var/run/docker.sock for log tailing + container
    # restarts, that user must be in a group with the SAME gid as the host's
    # `docker` group (987 on this Umbrel — see `getent group docker`).
    group_add:
      - "987"
    depends_on:
      - bchn
      - ckpool
    environment:
      NODE_ENV: production
      PORT: "3000"
      # Pools enabled in this app — comma-separated. Adding "btc" lights up
      # the header pool switcher; the actual btc-bitcoind + btc-ckpool
      # services land in a follow-up phase.
      POOLS: "bch,btc"
      # BCH (existing)
      BCH_RPC_HOST: bchn
      BCH_RPC_PORT: "28332"
      BCH_RPC_USER: bch
      BCH_RPC_PASS: ${APP_PASSWORD}
      CKPOOL_WWW_DIR_BCH: /ckpool-www
      CKPOOL_CONFIG_PATH_BCH: /ckpool-config/ckpool.conf
      CKPOOL_CONTAINER: bk-mining-solo-mining_ckpool_1
      BCHN_CONTAINER: bk-mining-solo-mining_bchn_1
      STRATUM_PORT_BCH: "4567"
      # BTC (slots reserved; populated when the btc-* services come online)
      BTC_RPC_HOST: btc-bitcoind
      BTC_RPC_PORT: "28332"
      BTC_RPC_USER: btc
      BTC_RPC_PASS: ${APP_PASSWORD}
      CKPOOL_WWW_DIR_BTC: /btc-ckpool-www
      CKPOOL_CONFIG_PATH_BTC: /btc-ckpool-config/ckpool.conf
      BTC_CKPOOL_CONTAINER: bk-mining-solo-mining_btc_ckpool_1
      BTC_BITCOIND_CONTAINER: bk-mining-solo-mining_btc_bitcoind_1
      STRATUM_PORT_BTC: "7890"
      # Back-compat aliases for code that hasn't been migrated to the
      # per-pool env scheme.
      STRATUM_PORT: "4567"
      CKPOOL_WWW_DIR: /ckpool-www
      CKPOOL_CONFIG_PATH: /ckpool-config/ckpool.conf
      SNAPSHOTS_DIR: /snapshots
    volumes:
      - ${APP_DATA_DIR}/data/ckpool/www:/ckpool-www:ro
      - ${APP_DATA_DIR}/data/ckpool/config:/ckpool-config
      - ${APP_DATA_DIR}/data/btc/ckpool/www:/btc-ckpool-www:ro
      - ${APP_DATA_DIR}/data/btc/ckpool/config:/btc-ckpool-config
      - ${APP_DATA_DIR}/data/snapshots:/snapshots
      - /var/run/docker.sock:/var/run/docker.sock
