version: "3.7"

# Umbrel injects:
#   networks.default → external umbrel_main_network (via common.yml fragment)
#   services.app_proxy → image, ports, volumes (via app_proxy.yml fragment)
# So we don't define `default` ourselves, and we declare app_proxy with only
# the overrides Umbrel allows (env, container_name).

services:
  app_proxy:
    environment:
      APP_HOST: bk-mining-solo-mining-dashboard
      APP_PORT: 3000
      JWT_SECRET: ${JWT_SECRET}
    container_name: bk-mining-solo-mining_app_proxy_1

  # One-shot service that renders the config templates into the real config
  # files on first boot. Idempotent: only writes if the destination is missing.
  init:
    image: alpine:3.22.1
    user: "0:0"
    environment:
      APPS_SUBNET: ${NETWORK_IP}/16
      APP_PASSWORD: ${APP_PASSWORD}
      APP_BCH_P2P_PORT: "28333"
      APP_BCH_RPC_PORT: "28332"
      APP_BCH_ZMQ_HASHBLOCK_PORT: "28334"
    volumes:
      - ${APP_DATA_DIR}/data:/data
    command:
      - /bin/sh
      - -ec
      - |
        apk add --no-cache envsubst >/dev/null
        mkdir -p \
          /data/bchn /data/ckpool/config /data/ckpool/www/pool /data/ckpool/www/users \
          /data/btc/bitcoind /data/btc/ckpool/config /data/btc/ckpool/www/pool /data/btc/ckpool/www/users \
          /data/dgb/bitcoind /data/dgb/ckpool/config /data/dgb/ckpool/www/pool /data/dgb/ckpool/www/users \
          /data/templates /data/snapshots

        # BCH templates → live config (idempotent)
        if [ ! -f /data/bchn/bitcoin.conf ]; then
          envsubst < /data/templates/bitcoin.conf.template > /data/bchn/bitcoin.conf
        fi
        if [ ! -f /data/ckpool/config/ckpool.conf ]; then
          envsubst < /data/templates/ckpool.conf.template > /data/ckpool/config/ckpool.conf
        fi

        # BTC templates → live config (idempotent). For a fresh install these
        # produce a CHANGE_ME btcaddress; for the AxeBTC migration the files
        # are pre-populated so the templates are skipped.
        if [ ! -f /data/btc/bitcoind/bitcoin.conf ]; then
          envsubst < /data/templates/btc-bitcoin.conf.template > /data/btc/bitcoind/bitcoin.conf
        fi
        if [ ! -f /data/btc/ckpool/config/ckpool.conf ]; then
          envsubst < /data/templates/btc-ckpool.conf.template > /data/btc/ckpool/config/ckpool.conf
        fi

        # DGB templates → live config (idempotent). digibyted reads digibyte.conf
        # (not bitcoin.conf). For the AxeDGB migration the chain dir is pre-populated.
        if [ ! -f /data/dgb/bitcoind/digibyte.conf ]; then
          envsubst < /data/templates/dgb-digibyte.conf.template > /data/dgb/bitcoind/digibyte.conf
        fi
        if [ ! -f /data/dgb/ckpool/config/ckpool.conf ]; then
          envsubst < /data/templates/dgb-ckpool.conf.template > /data/dgb/ckpool/config/ckpool.conf
        fi

        # Node-process dirs owned by 1000:1000 (bchn + bitcoind + digibyted
        # containers run as that uid). Ckpool stats dirs likewise — ckpool
        # writes there.
        chown -R 1000:1000 /data/bchn /data/ckpool/www /data/btc/bitcoind /data/btc/ckpool/www /data/dgb/bitcoind /data/dgb/ckpool/www
        # Dashboard (nextjs uid 1001) writes ckpool.conf + sentinel files in
        # the per-pool ckpool/config dirs and the snapshots dir. ckpool runs
        # as 1000 but only READS the config, so 1001-owned + mode 644 works.
        chown -R 1001:1001 /data/ckpool/config /data/btc/ckpool/config /data/dgb/ckpool/config /data/snapshots
        echo "[init] ready"

  bchn:
    image: ghcr.io/willitmod/bitcoin-cash-node:v29.0.0-wm3
    container_name: bk-mining-solo-mining_bchn_1
    user: "1000:1000"
    restart: unless-stopped
    stop_grace_period: 15m30s
    depends_on:
      init:
        condition: service_completed_successfully
    ports:
      - "28333:28333/tcp"
    volumes:
      - ${APP_DATA_DIR}/data/bchn:/data
      - ${APP_DATA_DIR}/data/templates/bchn-entrypoint.sh:/bchn-entrypoint.sh:ro
    entrypoint:
      - /bin/sh
      - /bchn-entrypoint.sh
    healthcheck:
      test: ["CMD-SHELL", "bitcoin-cli -datadir=/data getblockchaininfo >/dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 2m

  ckpool:
    image: ghcr.io/willitmod/wim-solo-ckpool:0.8.3-rc1-590fb2a
    container_name: bk-mining-solo-mining_ckpool_1
    user: "1000:1000"
    restart: on-failure
    stop_grace_period: 30s
    depends_on:
      bchn:
        condition: service_healthy
    ports:
      - "4567:3333/tcp"
    volumes:
      # Note: ckpool needs to read /config and may need to read sentinel files
      # the dashboard writes there. Mounted RW (dashboard chmod 644).
      - ${APP_DATA_DIR}/data/ckpool/config:/config
      - ${APP_DATA_DIR}/data/ckpool/www:/www
      - ${APP_DATA_DIR}/data/templates/ckpool-entrypoint.sh:/ckpool-entrypoint.sh:ro
    entrypoint:
      - /bin/sh
      - /ckpool-entrypoint.sh

  btc-bitcoind:
    # Reusing WillItMod's image because it bundles Bitcoin Core binaries
    # compatible with the AxeBTC chain data we migrated. NOTE: this image's
    # default CMD runs a Node.js orchestrator (`node dist/server.js`) — we
    # override the entrypoint to run bitcoind directly, matching AxeBTC's
    # own approach. The image's PATH includes bitcoind via the
    # /opt/bitcoind/current symlink.
    image: ghcr.io/willitmod/axebtc-bitcoind-switch:0.7.44
    container_name: bk-mining-solo-mining_btc_bitcoind_1
    user: "1000:1000"
    restart: unless-stopped
    stop_grace_period: 15m30s
    depends_on:
      init:
        condition: service_completed_successfully
    ports:
      - "8333:8333/tcp"
    volumes:
      - ${APP_DATA_DIR}/data/btc/bitcoind:/data
      - ${APP_DATA_DIR}/data/templates/btc-bitcoind-entrypoint.sh:/btc-bitcoind-entrypoint.sh:ro
    entrypoint:
      - /bin/sh
      - /btc-bitcoind-entrypoint.sh
    healthcheck:
      test: ["CMD-SHELL", "bitcoin-cli -datadir=/data getblockchaininfo >/dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 2m

  btc-ckpool:
    image: ghcr.io/willitmod/wim-solo-ckpool:0.8.3-rc1-590fb2a
    container_name: bk-mining-solo-mining_btc_ckpool_1
    user: "1000:1000"
    restart: on-failure
    stop_grace_period: 30s
    depends_on:
      btc-bitcoind:
        condition: service_healthy
    ports:
      - "7890:3333/tcp"
    volumes:
      - ${APP_DATA_DIR}/data/btc/ckpool/config:/config
      - ${APP_DATA_DIR}/data/btc/ckpool/www:/www
      - ${APP_DATA_DIR}/data/templates/ckpool-entrypoint.sh:/ckpool-entrypoint.sh:ro
    entrypoint:
      - /bin/sh
      - /ckpool-entrypoint.sh

  dgb-bitcoind:
    # digibyted (DGB's bitcoind fork). Image is single-binary, no orchestrator
    # so we use a simple custom entrypoint exec'ing digibyted directly with
    # our tuning flags.
    image: ghcr.io/willitmod/digibyte:8.26.2
    container_name: bk-mining-solo-mining_dgb_bitcoind_1
    user: "1000:1000"
    restart: unless-stopped
    stop_grace_period: 15m30s
    depends_on:
      init:
        condition: service_completed_successfully
    ports:
      - "12024:12024/tcp"
    volumes:
      - ${APP_DATA_DIR}/data/dgb/bitcoind:/data
      - ${APP_DATA_DIR}/data/templates/dgb-bitcoind-entrypoint.sh:/dgb-bitcoind-entrypoint.sh:ro
    entrypoint:
      - /bin/sh
      - /dgb-bitcoind-entrypoint.sh
    healthcheck:
      test: ["CMD-SHELL", "digibyte-cli -datadir=/data getblockchaininfo >/dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 2m

  dgb-rpc-proxy:
    # Sits between dgb-ckpool and dgb-bitcoind. Only purpose: inject
    # "sha256d" as the positional algo arg on getblocktemplate calls so
    # digibyted returns SHA-256d-tagged templates (version 0x20000202) and
    # ckpool's submitted blocks verify correctly. Without this, default
    # algo is scrypt and every block we'd solve gets rejected by digibyted.
    image: node:22-alpine
    container_name: bk-mining-solo-mining_dgb_rpc_proxy_1
    user: "1000:1000"
    restart: unless-stopped
    depends_on:
      dgb-bitcoind:
        condition: service_healthy
    environment:
      UPSTREAM_HOST: dgb-bitcoind
      UPSTREAM_PORT: "14022"
      LISTEN_PORT: "14022"
      DGB_ALGO: sha256d
    volumes:
      - ${APP_DATA_DIR}/data/templates/dgb-rpc-proxy.js:/proxy.js:ro
    command: ["node", "/proxy.js"]

  dgb-ckpool:
    # ckpool is SHA-256d-only. DGB supports SHA-256d as one of 5 algos but
    # its default getblocktemplate returns scrypt-tagged templates. We route
    # through dgb-rpc-proxy which injects "sha256d" as the algo arg so the
    # version bits in the template (and therefore in any solved block ckpool
    # submits) tag the work as SHA-256d. digibyted then verifies via SHA-256d
    # and accepts. Without the proxy, every "solved" block was rejected.
    image: ghcr.io/willitmod/wim-solo-ckpool:0.8.3-rc1-590fb2a
    container_name: bk-mining-solo-mining_dgb_ckpool_1
    user: "1000:1000"
    restart: on-failure
    stop_grace_period: 30s
    depends_on:
      dgb-rpc-proxy:
        condition: service_started
      dgb-bitcoind:
        condition: service_healthy
    ports:
      - "5678:3333/tcp"
    volumes:
      - ${APP_DATA_DIR}/data/dgb/ckpool/config:/config
      - ${APP_DATA_DIR}/data/dgb/ckpool/www:/www
      - ${APP_DATA_DIR}/data/templates/ckpool-entrypoint.sh:/ckpool-entrypoint.sh:ro
    entrypoint:
      - /bin/sh
      - /ckpool-entrypoint.sh

  dashboard:
    # Published from the dashboard/ source on every release. Built and
    # pushed manually for now — bump the tag here when you push a new
    # version. Umbrel updates do `docker compose pull` against this
    # registry, which is why the image must live somewhere public, not
    # just as a locally-built tag.
    image: ghcr.io/bambryan/bk-mining-dashboard:0.2.2
    container_name: bk-mining-solo-mining-dashboard
    restart: unless-stopped
    # The dashboard runs as uid 1001 (nextjs user from its Dockerfile). To
    # call the Docker API via /var/run/docker.sock for log tailing + container
    # restarts, that user must be in a group with the SAME gid as the host's
    # `docker` group (987 on this Umbrel — see `getent group docker`).
    group_add:
      - "987"
    depends_on:
      - bchn
      - ckpool
    environment:
      NODE_ENV: production
      PORT: "3000"
      # Pools enabled in this app — comma-separated.
      POOLS: "bch,btc,dgb"
      # BCH (existing)
      BCH_RPC_HOST: bchn
      BCH_RPC_PORT: "28332"
      BCH_RPC_USER: bch
      BCH_RPC_PASS: ${APP_PASSWORD}
      CKPOOL_WWW_DIR_BCH: /ckpool-www
      CKPOOL_CONFIG_PATH_BCH: /ckpool-config/ckpool.conf
      CKPOOL_CONTAINER: bk-mining-solo-mining_ckpool_1
      BCHN_CONTAINER: bk-mining-solo-mining_bchn_1
      STRATUM_PORT_BCH: "4567"
      # BTC (slots reserved; populated when the btc-* services come online)
      BTC_RPC_HOST: btc-bitcoind
      BTC_RPC_PORT: "28332"
      BTC_RPC_USER: btc
      BTC_RPC_PASS: ${APP_PASSWORD}
      CKPOOL_WWW_DIR_BTC: /btc-ckpool-www
      CKPOOL_CONFIG_PATH_BTC: /btc-ckpool-config/ckpool.conf
      BTC_CKPOOL_CONTAINER: bk-mining-solo-mining_btc_ckpool_1
      BTC_BITCOIND_CONTAINER: bk-mining-solo-mining_btc_bitcoind_1
      STRATUM_PORT_BTC: "7890"
      # DGB
      DGB_RPC_HOST: dgb-bitcoind
      DGB_RPC_PORT: "14022"
      DGB_RPC_USER: dgb
      DGB_RPC_PASS: ${APP_PASSWORD}
      CKPOOL_WWW_DIR_DGB: /dgb-ckpool-www
      CKPOOL_CONFIG_PATH_DGB: /dgb-ckpool-config/ckpool.conf
      DGB_CKPOOL_CONTAINER: bk-mining-solo-mining_dgb_ckpool_1
      DGB_BITCOIND_CONTAINER: bk-mining-solo-mining_dgb_bitcoind_1
      STRATUM_PORT_DGB: "5678"
      # Back-compat aliases for code that hasn't been migrated to the
      # per-pool env scheme.
      STRATUM_PORT: "4567"
      CKPOOL_WWW_DIR: /ckpool-www
      CKPOOL_CONFIG_PATH: /ckpool-config/ckpool.conf
      SNAPSHOTS_DIR: /snapshots
    volumes:
      - ${APP_DATA_DIR}/data/ckpool/www:/ckpool-www:ro
      - ${APP_DATA_DIR}/data/ckpool/config:/ckpool-config
      - ${APP_DATA_DIR}/data/btc/ckpool/www:/btc-ckpool-www:ro
      - ${APP_DATA_DIR}/data/btc/ckpool/config:/btc-ckpool-config
      - ${APP_DATA_DIR}/data/dgb/ckpool/www:/dgb-ckpool-www:ro
      - ${APP_DATA_DIR}/data/dgb/ckpool/config:/dgb-ckpool-config
      - ${APP_DATA_DIR}/data/snapshots:/snapshots
      - /var/run/docker.sock:/var/run/docker.sock
