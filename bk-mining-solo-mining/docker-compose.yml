version: "3.7"

# Umbrel injects:
#   networks.default → external umbrel_main_network (via common.yml fragment)
#   services.app_proxy → image, ports, volumes (via app_proxy.yml fragment)
# So we don't define `default` ourselves, and we declare app_proxy with only
# the overrides Umbrel allows (env, container_name).

services:
  app_proxy:
    environment:
      APP_HOST: bk-mining-solo-mining-dashboard
      APP_PORT: 3000
      JWT_SECRET: ${JWT_SECRET}
    container_name: bk-mining-solo-mining_app_proxy_1

  # One-shot service that renders the config templates into the real config
  # files on first boot. Idempotent: only writes if the destination is missing.
  init:
    image: alpine:3.22.1
    user: "0:0"
    environment:
      APPS_SUBNET: ${NETWORK_IP}/16
      APP_PASSWORD: ${APP_PASSWORD}
      APP_BCH_P2P_PORT: "28333"
      APP_BCH_RPC_PORT: "28332"
      APP_BCH_ZMQ_HASHBLOCK_PORT: "28334"
    volumes:
      - ${APP_DATA_DIR}/data:/data
    command:
      - /bin/sh
      - -ec
      - |
        apk add --no-cache envsubst >/dev/null
        mkdir -p /data/bchn /data/ckpool/config /data/ckpool/www/pool /data/ckpool/www/users /data/templates /data/snapshots

        if [ ! -f /data/bchn/bitcoin.conf ]; then
          envsubst < /data/templates/bitcoin.conf.template > /data/bchn/bitcoin.conf
        fi
        if [ ! -f /data/ckpool/config/ckpool.conf ]; then
          envsubst < /data/templates/ckpool.conf.template > /data/ckpool/config/ckpool.conf
        fi

        chown -R 1000:1000 /data/bchn /data/ckpool/www
        # Dashboard runs as nextjs uid 1001 and writes ckpool.conf + sentinel
        # files in /data/ckpool/config. ckpool runs as 1000 but only READS
        # from /config, so 1001-owned + mode 644 works for both.
        chown -R 1001:1001 /data/ckpool/config /data/snapshots
        echo "[init] ready"

  bchn:
    image: ghcr.io/willitmod/bitcoin-cash-node:v29.0.0-wm3
    container_name: bk-mining-solo-mining_bchn_1
    user: "1000:1000"
    restart: unless-stopped
    stop_grace_period: 15m30s
    depends_on:
      init:
        condition: service_completed_successfully
    ports:
      - "28333:28333/tcp"
    volumes:
      - ${APP_DATA_DIR}/data/bchn:/data
      - ${APP_DATA_DIR}/data/templates/bchn-entrypoint.sh:/bchn-entrypoint.sh:ro
    entrypoint:
      - /bin/sh
      - /bchn-entrypoint.sh
    healthcheck:
      test: ["CMD-SHELL", "bitcoin-cli -datadir=/data getblockchaininfo >/dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 2m

  ckpool:
    image: ghcr.io/willitmod/wim-solo-ckpool:0.8.3-rc1-590fb2a
    container_name: bk-mining-solo-mining_ckpool_1
    user: "1000:1000"
    restart: on-failure
    stop_grace_period: 30s
    depends_on:
      bchn:
        condition: service_healthy
    ports:
      - "4567:3333/tcp"
    volumes:
      # Note: ckpool needs to read /config and may need to read sentinel files
      # the dashboard writes there. Mounted RW (dashboard chmod 644).
      - ${APP_DATA_DIR}/data/ckpool/config:/config
      - ${APP_DATA_DIR}/data/ckpool/www:/www
      - ${APP_DATA_DIR}/data/templates/ckpool-entrypoint.sh:/ckpool-entrypoint.sh:ro
    entrypoint:
      - /bin/sh
      - /ckpool-entrypoint.sh

  dashboard:
    image: bk-mining-solo-mining-dashboard:0.1.0
    pull_policy: never
    container_name: bk-mining-solo-mining-dashboard
    restart: unless-stopped
    # The dashboard runs as uid 1001 (nextjs user from its Dockerfile). To
    # call the Docker API via /var/run/docker.sock for log tailing + container
    # restarts, that user must be in a group with the SAME gid as the host's
    # `docker` group (987 on this Umbrel — see `getent group docker`).
    group_add:
      - "987"
    depends_on:
      - bchn
      - ckpool
    environment:
      NODE_ENV: production
      PORT: "3000"
      BCH_RPC_HOST: bchn
      BCH_RPC_PORT: "28332"
      BCH_RPC_USER: bch
      BCH_RPC_PASS: ${APP_PASSWORD}
      CKPOOL_WWW_DIR: /ckpool-www
      CKPOOL_CONFIG_PATH: /ckpool-config/ckpool.conf
      CKPOOL_CONTAINER: bk-mining-solo-mining_ckpool_1
      BCHN_CONTAINER: bk-mining-solo-mining_bchn_1
      STRATUM_PORT: "4567"
      SNAPSHOTS_DIR: /snapshots
    volumes:
      - ${APP_DATA_DIR}/data/ckpool/www:/ckpool-www:ro
      - ${APP_DATA_DIR}/data/ckpool/config:/ckpool-config
      - ${APP_DATA_DIR}/data/snapshots:/snapshots
      - /var/run/docker.sock:/var/run/docker.sock
