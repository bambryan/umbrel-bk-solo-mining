id: bk-mining-solo-mining
category: bitcoin
name: BK Solo Mining
version: "0.2.2"
tagline: Solo mining for BCH, BTC, and DGB — full nodes + ckpool + dashboard
icon: https://raw.githubusercontent.com/bambryan/umbrel-bk-solo-mining/main/bk-mining-solo-mining/icon.png
description: >-
  Run your own solo mining pool for Bitcoin Cash, Bitcoin, and DigiByte on
  your Umbrel. Each coin gets a full node (BCHN / Bitcoin Core / DigiByte)
  plus a dedicated ckpool instance. Coinbase rewards for solved blocks are
  paid directly to the address you configure — zero pool fees, zero
  middlemen.


  Comes with a Next.js dashboard that shows pool hashrate (1m/1h/1d
  sparklines), worker breakdown, network difficulty, profitability per
  coin, a unified solved-block log, and live ckpool/node log tailing. All
  admin (payout address, coinbase signature, vardiff, restart, enable /
  disable a coin) is doable from the UI — no ssh required.


  Pick one coin or run all three. Disabling a coin stops its containers
  but preserves chain data, so you can switch on a coin any time without
  resyncing.


  Stratum endpoints — point your SHA-256 miners at:
  BCH `stratum+tcp://<umbrel-ip>:4567`,
  BTC `stratum+tcp://<umbrel-ip>:7890`,
  DGB `stratum+tcp://<umbrel-ip>:5678`.
  Use any address for that coin as the username.
releaseNotes: >-
  0.2.2 — Profit screen now compares coins apples-to-apples. It sums the
  hashrate connected across every pool and runs that total against each
  coin's difficulty, so BTC/BCH/DGB all show a real expected $/day even
  when your rigs are currently pointed at just one of them — answering
  "where should I aim everything?" instead of only scoring the pool that
  happens to have miners on it. New Difficulty column; $/day uses the
  SHA-256d formula (blocks/day = hashrate × 86400 / (difficulty × 2³²)).


  0.2.1 — Dashboard image now published to GHCR so `docker compose pull`
  resolves cleanly during Umbrel updates (0.2.0 referenced a
  locally-built tag that 404'd on the registry and tore the app down on
  every update — fixed here).


  0.2.0 — Multi-coin release. Added BTC (Bitcoin Core) and DGB (DigiByte)
  alongside BCH. New /pools dashboard with per-coin tiles, /blocks log
  unified across all three pools, /profit tab with live $/day estimates,
  and a first-run wizard that lets you opt into coins one at a time
  (disabled coins keep their chain data but stop their containers).
  DGB SHA-256 mining works against digibyted via a transparent RPC proxy
  that injects the correct algo tag — solo blocks pay out cleanly. Fix
  for ckpool sending bare-LF HTTP that Node's strict parser was
  rejecting. Block-solved banner with celebration + 24h auto-fade.
